name: Android APK Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Build web bundle and sync into the Android project
        run: npm run cap:sync

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        id: apk
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          NAME="WoW-Guide-Manager-${VERSION}.apk"
          mkdir -p dist-apk
          cp android/app/build/outputs/apk/debug/app-debug.apk "dist-apk/${NAME}"
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: dist-apk/*.apk

      - name: Attach APK to GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" "dist-apk/${{ steps.apk.outputs.name }}" \
            --repo "$GITHUB_REPOSITORY" --clobber
