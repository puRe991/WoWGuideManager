<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#06080f" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>WoW Guide Manager</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-top">
          <a href="#start" class="site-logo" id="logo-link">
            <span class="site-logo-mark">WGM</span>
            <span class="site-logo-text"><b>Guide Manager</b><small>WoW Guide Bibliothek</small></span>
          </a>
          <button type="button" class="sidebar-toggle" id="sidebar-toggle" aria-label="Menü umschalten">☰</button>
        </div>
        <div class="sidebar-body" id="sidebar-body">
          <label class="search-field">
            <span class="search-icon" aria-hidden="true">⌕</span>
            <input id="search" placeholder="Guide suchen…" autocomplete="off" />
          </label>
          <div class="expansion-switch" id="expansion-switch" role="tablist" aria-label="Erweiterung wählen"></div>
          <nav class="site-nav" id="site-nav" aria-label="Hauptnavigation">
            <a href="#start" data-nav="start"><span class="nav-dot"></span><span class="nav-label">Übersicht</span><span class="nav-count" id="nav-count-start"></span></a>
            <a href="#class-guides" data-nav="class-guides"><span class="nav-dot"></span><span class="nav-label">Klassen</span><span class="nav-count" id="nav-count-class-guides"></span></a>
            <a href="#profession-guides" data-nav="profession-guides"><span class="nav-dot"></span><span class="nav-label">Berufe</span><span class="nav-count" id="nav-count-profession-guides"></span></a>
            <a href="#farming-guides" data-nav="farming-guides"><span class="nav-dot"></span><span class="nav-label">Farmen</span><span class="nav-count" id="nav-count-farming-guides"></span></a>
            <a href="#dungeon-guides" data-nav="dungeon-guides"><span class="nav-dot"></span><span class="nav-label">Dungeons</span><span class="nav-count" id="nav-count-dungeon-guides"></span></a>
            <a href="#guides" data-nav="guides"><span class="nav-dot"></span><span class="nav-label">Bibliothek</span><span class="nav-count" id="nav-count-guides"></span></a>
            <a href="#subscriptions" data-nav="subscriptions"><span class="nav-dot"></span><span class="nav-label">Preise</span></a>
          </nav>
          <div class="sidebar-footer">
            <div class="package-box" id="package-box"></div>
            <small class="sidebar-tag">Portable Windows · Android · iOS</small>
          </div>
        </div>
      </aside>
      <main class="view-root" id="view-root">
        <section id="expansion-picker" class="hidden"></section>
        <div id="view-content"></div>
      </main>
    </div>
    <script type="module" src="./src/app.js"></script>
  </body>
</html>
